# Meeting Notes — Docker Configuration
# Copy to config.yaml in the project root:  cp config.docker.yaml config.yaml
# Then set your hf_token below and adjust settings as needed.

# ===========================================================================
# HuggingFace token (REQUIRED for speaker diarization)
#
# 1. Create an account at https://huggingface.co
# 2. Accept model terms at https://huggingface.co/pyannote/speaker-diarization-community-1
# 3. Generate a token at https://huggingface.co/settings/tokens
# 4. Paste it below
# ===========================================================================
hf_token: ""

# ===========================================================================
# LLM Provider — pick ONE of the options below
# ===========================================================================

# --- Option A: Local Ollama (run with: docker compose --profile ollama up) ---
llm_provider: ollama
llm_model: qwen2.5-coder:32b
ollama_url: http://ollama:11434

# --- Option B: OpenAI-compatible API (comment out Option A, uncomment below) ---
# llm_provider: openai
# llm_model: gpt-4o
# llm_api_key: "sk-..."
# llm_base_url: https://api.openai.com/v1

# ===========================================================================
# Transcription
# ===========================================================================
whisper_model: large-v3
whisper_device: cuda           # auto-falls back to cpu if no GPU detected
whisper_compute_type: float16  # use "int8" for CPU-only

# ===========================================================================
# Database
# ===========================================================================

# SQLite (default — persisted in Docker volume)
database_url: "sqlite:////app/data/meeting-notes.db"

# PostgreSQL (uncomment to use an external database instead)
# database_url: "postgresql://user:password@host:5432/meeting_notes"

# ===========================================================================
# Chunking
# ===========================================================================
chunk_max_tokens: 3000
chunk_overlap_seconds: 120.0
