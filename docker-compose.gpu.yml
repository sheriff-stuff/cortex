# GPU override — use with:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml --profile ollama up --build
#
# Requires: NVIDIA GPU + nvidia-container-toolkit on the host
# Install guide: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html

services:
  backend:
    build:
      args:
        TORCH_INDEX_URL: https://download.pytorch.org/whl/cu121
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
