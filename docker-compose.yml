services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TORCH_INDEX_URL: https://download.pytorch.org/whl/cpu
    ports:
      - "9000:9000"
    volumes:
      - hf-cache:/root/.cache/huggingface
      - db-data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    env_file:
      - path: .env
        required: false
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  hf-cache:
  db-data:
  ollama-data:
